---
# ── Timezone ───────────────────────────────────────────────────────
timezone: Europe/London

# ── SSH hardening ──────────────────────────────────────────────────
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_max_auth_tries: 3
ssh_allowed_users: homelab

# ── Tailscale SSH ──────────────────────────────────────────────────
# Generate reusable auth key: https://login.tailscale.com/admin/settings/keys
# Run playbook with: TS_AUTHKEY=tskey-auth-xxx ansible-playbook site.yml
tailscale_auth_key: "{{ lookup('env', 'TS_AUTHKEY') }}"
tailscale_accept_routes: true
tailscale_advertise_exit_node: false
tailscale_ssh_enabled: true
tailscale_ssh_port: 22

# ── Automatic security updates ────────────────────────────────────
unattended_upgrades_enabled: true
unattended_upgrades_blacklist:
  - kubeadm
  - kubectl
  - kubelet
  - kubernetes-cni
  - containerd.io

# ── Kernel modules ───────────────────────────────────────────────
kernel_modules:
  - overlay
  - br_netfilter

# ── sysctl settings for Kubernetes ──────────────────────────────
sysctl_settings:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1

# ── Kubernetes versions ────────────────────────────────────────────
k8s_version: "1.30"
containerd_version: "1.7"
