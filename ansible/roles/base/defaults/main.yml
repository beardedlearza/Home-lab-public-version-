---
base_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - nfs-common
  - open-iscsi
  - unattended-upgrades
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

# Bootstrap SSH key — temporary, used only for first Ansible run
# Get your key: cat ~/.ssh/id_ed25519.pub
# This is removed after Tailscale SSH is working
bootstrap_ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... YOUR-KEY-HERE"
